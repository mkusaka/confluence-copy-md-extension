<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confluence Copy Helper Options</title>
    <script type="module" src="/src/options.ts"></script>
  </head>
  <body>
    <main class="options-page">
      <section class="settings-panel" aria-labelledby="settings-title">
        <h1 id="settings-title">Confluence Copy Helper</h1>
        <label class="setting-row">
          <input id="include-frontmatter" type="checkbox" />
          <span>
            <span class="setting-label">YAML frontmatter</span>
            <span class="setting-description">Include page metadata when copying Markdown.</span>
          </span>
        </label>
        <p id="save-status" class="save-status" role="status" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
